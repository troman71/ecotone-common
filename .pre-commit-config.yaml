# Pre-commit hooks for ecotone-common
# Install: brew install pre-commit && pre-commit install

repos:
  # Ecotone standard formatters — defined in this repo, referenced locally
  - repo: local
    hooks:
      - id: ecotone-black
        name: Black (Ecotone standard formatter)
        language: python
        entry: black
        types: [python]
        additional_dependencies: ["black==24.4.2"]
        args: [--line-length=100]

      - id: ecotone-isort
        name: isort (Ecotone standard import sorter)
        language: python
        entry: isort
        types: [python]
        additional_dependencies: ["isort==5.13.2"]
        args: [--profile=black, --line-length=100]

  # Standard file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-ast
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=5000"]
